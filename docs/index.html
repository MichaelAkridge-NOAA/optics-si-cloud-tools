<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optics SI Cloud Codelabs</title>
  <style>
    body { font-family: Roboto, Arial, sans-serif; background: #f4f7ff; margin: 0; color: #22314d; }
    .hero {
      background: linear-gradient(130deg, #3f66b8 0%, #4f7dc9 40%, #5d8fe1 100%);
      color: #fff;
      padding: 2rem 1rem;
      box-shadow: inset 0 -1px 0 #ffffff33;
    }
    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      justify-content: center;
    }
    .logo-badge {
      background: #fff;
      border-radius: 12px;
      padding: 0.55rem 0.75rem;
      box-shadow: 0 10px 24px #1d356929;
      border: 1px solid #ffffff66;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-badge img { height: 76px; width: auto; display: block; }
    .hero h1 { margin: 0; color: #fff; font-size: 1.7rem; }
    .hero p { font-size: 1.05rem; max-width: 720px; margin: 0.35rem 0 0; color: #eef3ff; }
    .page-content { max-width: 1400px; margin: 0 auto; padding: 1.2rem 1rem 2rem; }
    .quick-links { display: flex; flex-wrap: wrap; gap: 0.65rem; margin: 0.4rem 0 1.1rem; }
    .quick-link {
      text-decoration: none;
      background: #fff;
      color: #274079;
      border: 1px solid #d7e4ff;
      padding: 0.5rem 0.8rem;
      border-radius: 999px;
      font-size: 0.93rem;
      font-weight: 500;
      transition: all 0.2s;
      box-shadow: 0 2px 8px #233d700d;
    }
    .quick-link:hover { background: #edf3ff; border-color: #b9d0ff; }
    .search-bar { margin: 0.3rem auto 0.8rem; max-width: 560px; display: flex; gap: 0.5rem; }
    .search-bar input {
      flex: 1;
      padding: 0.7rem 0.9rem;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #d1ddf5;
      box-shadow: 0 1px 6px #213c730d;
    }
    .search-bar input:focus { outline: 2px solid #80a8f5; border-color: #7ba3ef; }
    .layout-toggle { display: flex; justify-content: center; gap: 0.55rem; margin: 0.2rem 0 0.9rem; }
    .layout-btn {
      border: 1px solid #c9dafd;
      background: #fff;
      color: #2b467f;
      padding: 0.42rem 0.8rem;
      border-radius: 999px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .layout-btn:hover { background: #edf3ff; }
    .layout-btn.active { background: #4F7DC9; color: #fff; border-color: #4F7DC9; }
    .section-controls { display: flex; justify-content: center; gap: 0.55rem; margin: -0.2rem 0 0.8rem; }
    .section-control-btn {
      border: 1px solid #c9dafd;
      background: #fff;
      color: #2b467f;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .section-control-btn:hover { background: #edf3ff; }
    .results-summary { text-align: center; color: #506385; font-size: 0.95rem; margin-bottom: 0.8rem; }
    .tags { display: none; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 1.2rem; }
    .tag { background: #e5eefc; color: #2a3b6b; border-radius: 16px; padding: 0.3em 1em; cursor: pointer; font-size: 0.95em; transition: background 0.2s; }
    .tag.selected { background: #4F7DC9; color: #fff; }
    .codelab-sections { display: flex; flex-direction: column; gap: 1.5rem; }
    .codelab-section {
      background: #f7faff;
      border: 1px solid #dde8ff;
      border-radius: 14px;
      padding: 1rem;
    }
    .section-heading {
      margin: 0;
      color: #22407d;
      font-size: 1.03rem;
      font-weight: 700;
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      user-select: none;
    }
    .section-heading::-webkit-details-marker { display: none; }
    .section-heading::after {
      content: '▾';
      color: #5e77a8;
      font-size: 0.9rem;
      transition: transform 0.2s;
    }
    .codelab-section:not([open]) .section-heading::after { transform: rotate(-90deg); }
    .section-body { margin-top: 0.35rem; }
    .section-subtitle {
      margin: 0 0 0.9rem;
      color: #536b96;
      font-size: 0.9rem;
    }
    .codelab-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.2rem; max-width: 1400px; margin: 0 auto 0.2rem; }
    .codelab-card { background: #fff; border-radius: 12px; box-shadow: 0 6px 20px #2a427714; padding: 1.3rem; display: flex; flex-direction: column; gap: 0.5rem; transition: box-shadow 0.2s, transform 0.2s; border: 1px solid #e2ebff; }
    .codelab-card:hover { box-shadow: 0 12px 28px #253d7022; transform: translateY(-2px); }
    .codelab-logo { height: 32px; width: 32px; object-fit: contain; margin-right: 0.7em; vertical-align: middle; }
    .codelab-title { font-size: 1.2rem; font-weight: 600; color: #2a3b6b; margin: 0; display: flex; align-items: center; gap: 0.7em; }
    .codelab-summary { color: #444; margin: 0.5em 0 0.5em 0; }
    .codelab-tags { display: flex; flex-wrap: wrap; gap: 0.3em; }
    .codelab-tag { background: #e3eafc; color: #2a3b6b; border-radius: 12px; padding: 0.2em 0.8em; font-size: 0.85em; }
    .codelab-link { margin-top: auto; align-self: flex-end; background: #4F7DC9; color: #fff; text-decoration: none; padding: 0.5em 1.2em; border-radius: 8px; font-weight: 500; transition: background 0.2s; }
    .codelab-link:hover { background: #34508b; }
    @media (max-width: 700px) {
      .hero-inner { flex-direction: column; text-align: center; }
      .hero p { margin: 0.5rem auto 0; }
      .logo-badge img { height: 66px; }
      .codelab-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="logo-badge">
        <img src="https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/optics_si_logo_v1.png" alt="Optics SI Logo">
      </div>
      <div>
        <h1>Optics SI Cloud Codelabs | Cloud Workstation Tools</h1>
        <p>Hands-on setup and operations guides for NOAA optics workflows on Google Cloud Workstations.</p>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="quick-links">
      <a class="quick-link" href="https://michaelakridge-noaa.github.io/optics-si-cloud-tools/" target="_blank" rel="noopener">🌐 Project Home</a>
      <a class="quick-link" href="https://github.com/MichaelAkridge-NOAA/optics-si-cloud-tools" target="_blank" rel="noopener">📦 GitHub Repository</a>
      <a class="quick-link" href="https://github.com/MichaelAkridge-NOAA/optics-si-cloud-tools/tree/main/scripts" target="_blank" rel="noopener">🧰 Setup Scripts</a>
      <a class="quick-link" href="https://github.com/MichaelAkridge-NOAA/cat" target="_blank" rel="noopener">🐠 CAT (Coral Annotation Tool)</a>
      <a class="quick-link" href="https://github.com/MichaelAkridge-NOAA/jetstream/tree/main" target="_blank" rel="noopener">🚀 JetStream</a>
      <a class="quick-link" href="https://github.com/MichaelAkridge-NOAA/optics-si-cloud-tools/issues" target="_blank" rel="noopener">📝 Feedback / Issues</a>
      <a class="quick-link" href="https://github.com/MichaelAkridge-NOAA/optics-si-cloud-tools/blob/main/README.md" target="_blank" rel="noopener">🚀 Quick Start</a>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔎 Search codelabs by title or summary...">
    </div>
    <div class="layout-toggle">
      <button id="sectionedBtn" class="layout-btn active" type="button">Sectioned</button>
      <button id="allBtn" class="layout-btn" type="button">All</button>
    </div>
    <div class="section-controls" id="sectionControls">
      <button id="expandAllBtn" class="section-control-btn" type="button">Expand all sections</button>
      <button id="collapseAllBtn" class="section-control-btn" type="button">Collapse all sections</button>
    </div>
    <div class="results-summary" id="resultsSummary"></div>
    <div class="tags" id="tagFilters"></div>
    <div class="codelab-sections" id="codelabList"></div>
  </main>
  <script>
    // List of codelabs with logo URLs
    const codelabEntries = [
      {
        path: 'codelabs/data-science-stack-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/anaconda/anaconda-original.svg'
      },
      {
        path: 'codelabs/dev-stack-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg'
      },
      {
        path: 'codelabs/google-cloud-workstations-101/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/gcloud.png'
      },
      {
        path: 'codelabs/desktop-gpu-persistent-setup/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/gcloud.png'
      },
      {
        path: 'codelabs/cat-install/codelab.json',
        logo: './logo/cat_logo.png'
      },
      {
        path: 'codelabs/jetstream-setup/codelab.json',
        logo: './logo/jetstream_logo_400px.png'
      },
      {
        path: 'codelabs/viame-dive-docker-setup/codelab.json',
        logo: './logo/codelabs.svg'
      },
      {
        path: 'codelabs/tator-setup/codelab.json',
        logo: './logo/codelabs.svg'
      },
      {
        path: 'codelabs/labelstudio-script-install/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/ls.ico'
      },
      {
        path: 'codelabs/workstation-health/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/gcloud.png'
      },
      {
        path: 'codelabs/workstation-cleanup/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/gcloud.png'
      },
      {
        path: 'codelabs/workstation-backup/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/gcloud.png'
      },
      {
        path: 'codelabs/python-env-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg'
      },
      {
        path: 'codelabs/jupyter-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/jupyter/jupyter-original-wordmark.svg'
      },
      {
        path: 'codelabs/r-rstudio-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/r/r-original.svg'
      },
      {
        path: 'codelabs/quarto-setup/codelab.json',
        logo: './logo/codelabs.svg'
      },
      {
        path: 'codelabs/positron-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/r/r-original.svg'
      },
      {
        path: 'codelabs/qgis-gdal-setup/codelab.json',
        logo: './logo/codelabs.svg'
      },
      {
        path: 'codelabs/dev-cli-tools-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/bash/bash-original.svg'
      },
      {
        path: 'codelabs/code-server-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg'
      },
      {
        path: 'codelabs/git-ssh-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg'
      },
      {
        path: 'codelabs/gcloud-adc-setup/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/gcloud.png'
      },
      {
        path: 'codelabs/docker-setup/codelab.json',
        logo: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg'
      },
      {
        path: 'codelabs/gcs-fuse-mount/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/gcloud.png'
      },
      {
        path: 'codelabs/chrome-remote-desktop-startup/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/crd.png'
      },
      {
        path: 'codelabs/meshroom-install/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/anim-meshroom-once.gif'
      },
      {
        path: 'codelabs/taglab-install/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/taglab.png'
      },
      {
        path: 'codelabs/njobvu-ai-docker-setup/codelab.json',
        logo: './logo/njobvu_docker_02.png'
      },
      {
        path: 'codelabs/labelstudio-docker-install/codelab.json',
        logo: 'https://raw.githubusercontent.com/MichaelAkridge-NOAA/optics-si-cloud-tools/refs/heads/main/docs/logo/ls.ico'
      }
    ];
    let codelabs = [];
    let allTags = new Set();
    let selectedTag = null;
    let layoutMode = 'sectioned';
    const DEFAULT_LOGO = './logo/codelabs.svg';
    const SECTION_DEFS = [
      {
        title: '🚀 Start Here',
        subtitle: 'Recommended first installs for most users.',
        urls: ['google-cloud-workstations-101', 'desktop-gpu-persistent-setup', 'data-science-stack-setup', 'dev-stack-setup']
      },
      {
        title: '🏥 Workstation Operations',
        subtitle: 'Health checks, cleanup, backup, and transfer operations.',
        urls: ['workstation-health', 'workstation-cleanup', 'workstation-backup', 'jetstream-setup']
      },
      {
        title: '🏷️ Annotation & Labeling',
        subtitle: 'Labeling tools and annotation-focused workflows.',
        urls: ['cat-install', 'njobvu-ai-docker-setup', 'tator-setup', 'viame-dive-docker-setup', 'taglab-install', 'labelstudio-docker-install','labelstudio-script-install']
      },
      {
        title: '📊 Data Science & GIS',
        subtitle: 'Python, R, Quarto, and geospatial analysis setup.',
        urls: ['python-env-setup', 'jupyter-setup', 'r-rstudio-setup', 'quarto-setup', 'positron-setup', 'qgis-gdal-setup', 'meshroom-install']
      },
      {
        title: '🛠️ Developer Setup',
        subtitle: 'Developer tooling, cloud auth, and platform setup.',
        urls: ['code-server-setup', 'git-ssh-setup', 'gcloud-adc-setup', 'docker-setup', 'gcs-fuse-mount', 'dev-cli-tools-setup', 'chrome-remote-desktop-startup']
      }
    ];

    // Load all codelab.json files and attach logo
    Promise.all(
      codelabEntries.map(entry =>
        fetch(entry.path).then(r => r.ok ? r.json().then(data => ({...data, logo: entry.logo})) : null)
      )
    ).then(data => {
      codelabs = data.filter(Boolean);
      allTags = new Set();
      codelabs.forEach(c => (c.tags||[]).forEach(t => allTags.add(t)));
      renderTags();
      renderCodelabs();
    });

    function renderTags() {
      const tagFilters = document.getElementById('tagFilters');
      tagFilters.innerHTML = '';
      Array.from(allTags).sort().forEach(tag => {
        const el = document.createElement('span');
        el.className = 'tag' + (selectedTag === tag ? ' selected' : '');
        el.textContent = tag;
        el.onclick = () => {
          selectedTag = selectedTag === tag ? null : tag;
          renderTags();
          renderCodelabs();
        };
        tagFilters.appendChild(el);
      });
    }

    function renderCodelabs() {
      const list = document.getElementById('codelabList');
      const resultsSummary = document.getElementById('resultsSummary');
      const sectionedBtn = document.getElementById('sectionedBtn');
      const allBtn = document.getElementById('allBtn');
      const sectionControls = document.getElementById('sectionControls');
      const search = document.getElementById('searchInput').value.toLowerCase();

      sectionedBtn.classList.toggle('active', layoutMode === 'sectioned');
      allBtn.classList.toggle('active', layoutMode === 'all');
      sectionControls.style.display = layoutMode === 'sectioned' ? 'flex' : 'none';

      list.innerHTML = '';
      let filtered = codelabs.filter(c => {
        const matchesTag = !selectedTag || (c.tags||[]).includes(selectedTag);
        const matchesSearch = !search ||
          c.title.toLowerCase().includes(search) ||
          (c.summary||'').toLowerCase().includes(search);
        return matchesTag && matchesSearch;
      });
      resultsSummary.textContent = `Showing ${filtered.length} of ${codelabs.length} codelabs`;
      if (filtered.length === 0) {
        list.innerHTML = '<div style="color:#888;text-align:center;padding:2em;">No codelabs found.</div>';
        return;
      }

      if (layoutMode === 'all') {
        const allGrid = document.createElement('div');
        allGrid.className = 'codelab-list';

        filtered.forEach(c => {
          const card = document.createElement('div');
          card.className = 'codelab-card';
          card.innerHTML = `
            <div class="codelab-title">${c.logo ? `<img src='${c.logo}' alt='${c.title} logo' class='codelab-logo' loading='lazy' onerror="this.onerror=null;this.src='${DEFAULT_LOGO}';">` : ''}${c.title}</div>
            <div class="codelab-summary">${c.summary||''}</div>
            <a class="codelab-link" href="./codelabs/${c.url}/" target="_blank">Open</a>
          `;
          allGrid.appendChild(card);
        });

        list.appendChild(allGrid);
        return;
      }

      const sectionBuckets = SECTION_DEFS.map(section => ({ ...section, items: [] }));
      const unmatched = [];

      filtered.forEach(c => {
        const section = sectionBuckets.find(s => s.urls.includes(c.url));
        if (section) {
          section.items.push(c);
        } else {
          unmatched.push(c);
        }
      });

      if (unmatched.length > 0) {
        sectionBuckets.push({
          title: '📚 More Guides',
          subtitle: 'Additional codelabs and reference walkthroughs.',
          urls: [],
          items: unmatched
        });
      }

      sectionBuckets.forEach(section => {
        if (!section.items.length) return;

        const sectionEl = document.createElement('details');
        sectionEl.className = 'codelab-section';
        sectionEl.open = true;

        const heading = document.createElement('summary');
        heading.className = 'section-heading';
        heading.textContent = `${section.title} (${section.items.length})`;
        sectionEl.appendChild(heading);

        const body = document.createElement('div');
        body.className = 'section-body';

        const subtitle = document.createElement('p');
        subtitle.className = 'section-subtitle';
        subtitle.textContent = section.subtitle;
        body.appendChild(subtitle);

        const sectionGrid = document.createElement('div');
        sectionGrid.className = 'codelab-list';

        section.items.forEach(c => {
          const card = document.createElement('div');
          card.className = 'codelab-card';
          card.innerHTML = `
            <div class="codelab-title">${c.logo ? `<img src='${c.logo}' alt='${c.title} logo' class='codelab-logo' loading='lazy' onerror="this.onerror=null;this.src='${DEFAULT_LOGO}';">` : ''}${c.title}</div>
            <div class="codelab-summary">${c.summary||''}</div>
            <a class="codelab-link" href="./codelabs/${c.url}/" target="_blank">Open</a>
          `;
          sectionGrid.appendChild(card);
        });

        body.appendChild(sectionGrid);
        sectionEl.appendChild(body);
        list.appendChild(sectionEl);
      });
    }

    document.getElementById('searchInput').addEventListener('input', renderCodelabs);
    document.getElementById('sectionedBtn').addEventListener('click', () => {
      layoutMode = 'sectioned';
      renderCodelabs();
    });
    document.getElementById('allBtn').addEventListener('click', () => {
      layoutMode = 'all';
      renderCodelabs();
    });
    document.getElementById('expandAllBtn').addEventListener('click', () => {
      document.querySelectorAll('.codelab-section').forEach(section => {
        section.open = true;
      });
    });
    document.getElementById('collapseAllBtn').addEventListener('click', () => {
      document.querySelectorAll('.codelab-section').forEach(section => {
        section.open = false;
      });
    });
  </script>
</body>
</html>
